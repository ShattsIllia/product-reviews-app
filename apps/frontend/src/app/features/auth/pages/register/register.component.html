<div class="auth-container">
  <mat-card class="auth-card">
    <mat-card-header>
      <mat-card-title>Sign Up</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Email</mat-label>
          <input matInput type="email" formControlName="email" placeholder="your@email.com" />
          <mat-error *ngIf="email?.hasError('required')"> Email is required </mat-error>
          <mat-error *ngIf="email?.hasError('email')"> Enter a valid email </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Full Name</mat-label>
          <input matInput type="text" formControlName="displayName" placeholder="Your name" />
          <mat-error *ngIf="displayName?.hasError('required')"> Name is required </mat-error>
          <mat-error *ngIf="displayName?.hasError('minlength')"> Minimum 2 characters </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Password</mat-label>
          <input
            matInput
            [type]="hidePassword ? 'password' : 'text'"
            formControlName="password"
            placeholder="••••••••"
          />
          <button mat-icon-button matIconSuffix (click)="togglePasswordVisibility()" type="button">
            <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
          <mat-error *ngIf="password?.hasError('required')"> Password is required </mat-error>
          <mat-error *ngIf="password?.hasError('minlength')"> Minimum 8 characters </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Confirm Password</mat-label>
          <input
            matInput
            [type]="hidePasswordConfirm ? 'password' : 'text'"
            formControlName="confirmPassword"
            placeholder="••••••••"
          />
          <button
            mat-icon-button
            matIconSuffix
            (click)="togglePasswordConfirmVisibility()"
            type="button"
          >
            <mat-icon>{{ hidePasswordConfirm ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
          <mat-error *ngIf="confirmPassword?.hasError('required')">
            Password confirmation is required
          </mat-error>
          <mat-error *ngIf="form.hasError('passwordMismatch') && passwordsMatch === false">
            Passwords do not match
          </mat-error>
        </mat-form-field>

        <div class="button-group">
          <button
            mat-raised-button
            color="primary"
            type="submit"
            [disabled]="form.invalid || isLoading"
            class="full-width"
          >
            <mat-spinner diameter="20" *ngIf="isLoading"></mat-spinner>
            <span *ngIf="!isLoading">Sign Up</span>
          </button>
        </div>
        <p class="auth-link">
          Already have an account?
          <a routerLink="/auth/login">Sign In</a>
        </p>
      </form>
    </mat-card-content>
  </mat-card>
</div>
