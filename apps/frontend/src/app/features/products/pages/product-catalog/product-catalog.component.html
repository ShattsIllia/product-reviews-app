<div class="products-container">
    <div class="filters-section">
        <form [formGroup]="filterForm" class="filters-form">
            <mat-form-field appearance="outline">
                <mat-label>Search</mat-label>
                <input matInput formControlName="search" placeholder="Search products..." />
                <button mat-icon-button matSuffix (click)="resetFilters()" type="button">
                    <mat-icon>clear</mat-icon>
                </button>
            </mat-form-field>

            <mat-form-field appearance="outline">
                <mat-label>Category</mat-label>
                <mat-select formControlName="category">
                    <mat-option value="">All categories</mat-option>
                    <mat-option *ngFor="let cat of categories" [value]="cat">
                        {{ cat }}
                    </mat-option>
                </mat-select>
            </mat-form-field>
        </form>
        <!-- DEBUG: Show product count -->
        <div style="font-size: 12px; color: #666; margin-top: 8px;">
            Total: {{ filteredProducts.length }} products
        </div>
    </div>

    <div class="loading" *ngIf="isLoading">
        <mat-spinner></mat-spinner>
    </div>

    <div class="products-grid" *ngIf="!isLoading">
        <app-product-card 
            *ngFor="let product of filteredProducts; trackBy: trackByProductId" 
            [product]="product"
            (click)="onProductSelect(product)" 
            data-testid="product-card">
        </app-product-card>
        <!-- DEBUG: Show first product data -->
        <div style="display: none;">{{ filteredProducts | json }}</div>
    </div>

    <div class="no-products" *ngIf="!isLoading && filteredProducts.length === 0">
        <p>No products found</p>
    </div>
</div>
