<div class="product-detail-container" *ngIf="!isLoading">
  <button mat-button (click)="goBack()">
    <mat-icon>arrow_back</mat-icon>
    Back
  </button>

  <div class="product-header" *ngIf="product">
    <div class="product-image">
      <img [src]="productImageUrl" [alt]="product.name" />
    </div>
    <div class="product-info">
      <h1 data-testid="product-title">{{ product.name }}</h1>
      <p class="description">{{ product.description }}</p>
      <div class="meta">
        <span class="category">{{ product.category }}</span>
        <span class="price" data-testid="product-price">
          {{ product.price | price }}
        </span>
      </div>
      <div class="rating" data-testid="product-rating" *ngIf="product.averageRating">
        <app-star-rating
          [rating]="product.averageRating"
          [reviewCount]="product.reviewCount || 0"
          [showValue]="true"
        >
        </app-star-rating>
      </div>
    </div>
  </div>

  <div class="reviews-section">
    <h2>Reviews</h2>

    <app-review-form
      [productId]="product?.id || ''"
      (reviewAdded)="onReviewAdded()"
      data-testid="review-form"
    ></app-review-form>

    <div class="loading" *ngIf="isLoadingReviews">
      <mat-spinner></mat-spinner>
    </div>

    <app-review-list
      [reviews]="reviews"
      [productId]="product?.id || ''"
      (reviewDeleted)="onReviewDeleted($event)"
      *ngIf="!isLoadingReviews"
    ></app-review-list>

    <div class="no-reviews" *ngIf="!isLoadingReviews && reviews.length === 0">
      <p>No reviews yet. Be the first!</p>
    </div>
  </div>
</div>

<div class="loading-container" *ngIf="isLoading">
  <mat-spinner></mat-spinner>
</div>
