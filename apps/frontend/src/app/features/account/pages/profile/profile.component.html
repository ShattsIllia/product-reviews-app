<div class="profile-container">
  <mat-card class="profile-card">
    <mat-card-header>
      <mat-card-title>My Profile</mat-card-title>
      <button mat-icon-button matTooltip="Back to products" (click)="onExit()" class="logout-btn">
        <mat-icon>close</mat-icon>
      </button>
    </mat-card-header>

    <mat-card-content *ngIf="!isLoading">
      <div class="avatar-section">
        <ng-container *ngIf="avatarUrlPreview; else placeholder">
          <img
            class="avatar-image"
            [src]="avatarUrlPreview"
            alt="Avatar"
            (error)="onAvatarError()"
            referrerpolicy="no-referrer"
          />
        </ng-container>
        <ng-template #placeholder>
          <div class="avatar-placeholder" *ngIf="currentUser">
            {{ currentUser.displayName.charAt(0).toUpperCase() }}
          </div>
        </ng-template>
      </div>

      <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Email</mat-label>
          <input matInput formControlName="email" />
          <mat-hint>Email cannot be changed</mat-hint>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Full Name</mat-label>
          <input matInput formControlName="displayName" placeholder="Your name" />
          <mat-error *ngIf="displayName?.hasError('required')"> Name is required </mat-error>
          <mat-error *ngIf="displayName?.hasError('minlength')"> Minimum 2 characters </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Avatar URL</mat-label>
          <input matInput formControlName="avatarUrl" placeholder="https://..." />
          <mat-hint>Link to profile image</mat-hint>
        </mat-form-field>

        <div class="button-group">
          <button
            mat-raised-button
            color="primary"
            type="submit"
            [disabled]="form.invalid || isSaving"
            data-testid="save-profile"
          >
            {{ isSaving ? 'Saving...' : 'Save' }}
          </button>
          <button mat-button type="button" (click)="onCancel()">Cancel</button>
        </div>
      </form>
    </mat-card-content>

    <mat-card-content *ngIf="isLoading">
      <div class="loading">
        <mat-spinner></mat-spinner>
      </div>
    </mat-card-content>
  </mat-card>
</div>
